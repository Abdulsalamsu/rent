<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>توزيع الإيجارات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg-1:           #0D1B2A;
    --bg-2:           #1B2A3F;
    --card:           rgba(255,255,255,0.055);
    --card-hover:     rgba(255,255,255,0.085);
    --card-border:    rgba(255,255,255,0.10);
    --card-border-hi: rgba(255,255,255,0.20);
    --gold:           #F0B429;
    --gold-hover:     #F5C842;
    --gold-glow:      rgba(240,180,41,0.18);
    --text:           #EEF0F3;
    --text-2:         #9AABB8;
    --text-3:         #59717F;
    --success:        #10B981;
    --success-bg:     rgba(16,185,129,0.12);
    --danger:         #EF4444;
    --r:              16px;
    --r-sm:           10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  button { touch-action: manipulation; }

  body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(150deg, var(--bg-1) 0%, var(--bg-2) 60%, #10243A 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
    direction: rtl;
  }

  /* ambient glow orb */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    right: -15%;
    width: 55%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(240,180,41,0.07) 0%, transparent 68%);
    pointer-events: none;
    z-index: 0;
  }

  .page { max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── Header ──────────────────────────── */
  .header {
    text-align: center;
    margin-bottom: 1.75rem;
    padding: 1.5rem 1rem 0.5rem;
  }
  .header-eyebrow {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.55rem;
  }
  .header h1 {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 1.15;
    background: linear-gradient(135deg, #fff 20%, #C4AE86 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-sub {
    font-size: 13.5px;
    color: var(--text-3);
    margin-top: 0.45rem;
  }

  /* ── Stats strip ─────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.1rem;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--r);
    padding: 1rem 1.1rem;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    text-align: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .stat-card:hover { background: var(--card-hover); border-color: var(--card-border-hi); }
  .stat-label {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.13em;
    color: var(--text-3);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .stat-value {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    direction: ltr;
    font-variant-numeric: tabular-nums;
    line-height: 1.25;
  }
  .stat-value.gold { color: var(--gold); }

  /* ── Input card ──────────────────────── */
  .input-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--r);
    padding: 1rem 1.25rem;
    margin-bottom: 0.9rem;
    display: flex;
    align-items: center;
    gap: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-card:focus-within {
    border-color: rgba(240,180,41,0.5);
    box-shadow: 0 0 0 3px var(--gold-glow), 0 2px 12px rgba(0,0,0,0.35);
  }
  .input-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    white-space: nowrap;
    letter-spacing: 0.03em;
  }
  .divider-v { width: 1px; height: 28px; background: var(--card-border); flex-shrink: 0; }
  .input-card input {
    flex: 1;
    font-family: 'Cairo', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    border: none;
    background: transparent;
    text-align: center;
    direction: ltr;
    outline: none;
    min-width: 0;
  }
  .input-card input::placeholder { color: var(--text-3); font-weight: 300; }
  .calc-btn {
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 700;
    background: var(--gold);
    color: #0D1B2A;
    border: none;
    border-radius: var(--r-sm);
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    white-space: nowrap;
    letter-spacing: 0.03em;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    box-shadow: 0 2px 10px rgba(240,180,41,0.35);
  }
  .calc-btn:hover  { background: var(--gold-hover); box-shadow: 0 4px 20px rgba(240,180,41,0.45); transform: translateY(-1px); }
  .calc-btn:active { transform: scale(0.97); }

  /* ── Tabs ────────────────────────────── */
  .tabs {
    display: flex;
    gap: 5px;
    margin-bottom: 0.85rem;
    background: rgba(0,0,0,0.25);
    padding: 5px;
    border-radius: var(--r);
    border: 1px solid var(--card-border);
  }
  .tab-btn {
    flex: 1;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 500;
    border-radius: calc(var(--r) - 4px);
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    border: none;
    background: transparent;
    color: var(--text-3);
    transition: all 0.2s;
    text-align: center;
    letter-spacing: 0.02em;
  }
  .tab-btn.active {
    background: var(--gold);
    color: #0D1B2A;
    font-weight: 700;
    box-shadow: 0 2px 12px rgba(240,180,41,0.35);
  }
  .tab-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.06); }

  /* ── Table card ──────────────────────── */
  .table-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--r);
    overflow: hidden;
    margin-bottom: 0.9rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 20px;
    border-bottom: 1px solid var(--card-border);
    flex-shrink: 0;
    background: rgba(0,0,0,0.18);
  }
  .card-title {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text-2);
    text-transform: uppercase;
  }
  .count-badge {
    font-size: 12px;
    color: var(--gold);
    background: var(--gold-glow);
    border: 1px solid rgba(240,180,41,0.28);
    border-radius: 20px;
    padding: 2px 12px;
    font-weight: 700;
  }

  /* ── Tab panels ──────────────────────── */
  .tab-panel { display: none; }
  .tab-panel.active { display: flex; flex-direction: column; }

  /* ── Tables ──────────────────────────── */
  .table-wrapper { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  thead th {
    padding: 11px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.11em;
    color: var(--text-3);
    background: rgba(0,0,0,0.22);
    border-bottom: 1px solid var(--card-border);
    text-transform: uppercase;
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.045); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.04); }
  tbody td { padding: 13px 16px; vertical-align: middle; }

  tfoot tr { border-top: 1px solid rgba(240,180,41,0.25); background: rgba(240,180,41,0.07); }
  tfoot td { padding: 14px 16px; font-weight: 700; color: var(--text); font-size: 14px; }

  /* ── Cell helpers ────────────────────── */
  .c-name     { text-align: right; font-weight: 500; }
  .c-pct      { text-align: center; }
  .c-num      { text-align: left; direction: ltr; font-variant-numeric: tabular-nums; color: var(--text-2); }
  .c-flag     { text-align: center; }
  .c-num-bold { text-align: left; direction: ltr; font-variant-numeric: tabular-nums; font-weight: 700; font-size: 15px; }

  tfoot .c-num      { font-weight: 700; font-size: 14.5px; color: var(--text); }
  tfoot .c-num-bold { font-size: 16px; font-weight: 700; color: var(--gold); }
  tfoot .c-name     { color: var(--text-2); font-weight: 600; }

  /* Tab 1 column widths */
  #panel1 table { table-layout: fixed; }
  #panel1 th:nth-child(1) { text-align: right; width: 48%; }
  #panel1 th:nth-child(2) { text-align: center; width: 18%; }
  #panel1 th:nth-child(3) { text-align: left; direction: ltr; width: 34%; }

  /* Tab 2 auto layout */
  #panel2 table { table-layout: auto; min-width: 700px; }
  #panel2 th:nth-child(1) { text-align: right; }
  #panel2 th:nth-child(2) { text-align: center; }
  #panel2 th:nth-child(3),
  #panel2 th:nth-child(5),
  #panel2 th:nth-child(6),
  #panel2 th:nth-child(7) { text-align: left; direction: ltr; }
  #panel2 th:nth-child(4) { text-align: center; }

  /* ── Badges ──────────────────────────── */
  .name-pill { display: inline-flex; align-items: center; gap: 8px; }
  .swatch {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
    opacity: 0.9;
  }

  .pct-badge {
    display: inline-block;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 20px;
    padding: 3px 11px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-2);
    direction: ltr;
    font-variant-numeric: tabular-nums;
  }

  .flag-yes {
    display: inline-block;
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid rgba(16,185,129,0.28);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 13px;
    font-weight: 600;
  }
  .flag-dash { color: var(--text-3); }

  /* ── Export bar ──────────────────────── */
  .export-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .exp-btn {
    flex: 1;
    min-width: 120px;
    padding: 13px 18px;
    font-size: 14.5px;
    font-weight: 600;
    border-radius: var(--r-sm);
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .exp-btn.primary {
    background: var(--gold);
    color: #0D1B2A;
    border: 1px solid var(--gold);
    box-shadow: 0 2px 12px rgba(240,180,41,0.28);
  }
  .exp-btn.primary:hover {
    background: var(--gold-hover);
    box-shadow: 0 4px 22px rgba(240,180,41,0.45);
    transform: translateY(-1px);
  }
  .exp-btn.ghost {
    background: var(--card);
    color: var(--text-2);
    border: 1px solid var(--card-border-hi);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .exp-btn.ghost:hover {
    background: var(--card-hover);
    color: var(--text);
    border-color: rgba(255,255,255,0.28);
    transform: translateY(-1px);
  }
  .exp-btn:active { transform: scale(0.97) translateY(0) !important; }

  /* ── Toast ───────────────────────────── */
  .toast {
    display: none;
    text-align: center;
    font-size: 13px;
    color: var(--success);
    background: var(--success-bg);
    border: 1px solid rgba(16,185,129,0.28);
    border-radius: var(--r-sm);
    padding: 11px 20px;
    margin-top: 10px;
    font-weight: 600;
    animation: fadeUp 0.22s ease;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .toast.show { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Print ───────────────────────────── */
  @media print {
    body { background: #fff; padding: 0; color: #000; }
    body::before { display: none; }
    .tabs, .input-card, .export-bar, .toast, .stats-row, .header-eyebrow, .header-sub { display: none !important; }
    .tab-panel { display: none !important; }
    .tab-panel.active { display: flex !important; flex-direction: column; }
    .table-card { box-shadow: none; background: #fff; border: 1px solid #ddd; }
    .card-header { background: #f5f5f5; }
    .card-title, .count-badge { color: #333 !important; background: none !important; border: none; }
    thead th { background: #f0f0f0 !important; color: #444 !important; }
    tfoot tr { background: #f8f8f8 !important; }
    tbody tr:hover { background: none; }
    tfoot .c-num-bold { color: #000 !important; }
    .pct-badge { background: #eee !important; color: #333 !important; border-color: #ccc !important; }
    .flag-yes  { background: #d1fae5 !important; color: #065f46 !important; border-color: #6ee7b7 !important; }
    #panel2 th:nth-child(4), #panel2 td:nth-child(4),
    #panel2 th:nth-child(5), #panel2 td:nth-child(5),
    #panel2 th:nth-child(6), #panel2 td:nth-child(6) { display: none !important; }
    thead th, tfoot tr { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  /* ── Mobile ──────────────────────────── */
  @media (max-width: 640px) {
    body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding-top:    max(env(safe-area-inset-top),    12px);
      padding-right:  max(env(safe-area-inset-right),  12px);
      padding-bottom: max(env(safe-area-inset-bottom), 10px);
      padding-left:   max(env(safe-area-inset-left),   12px);
    }

    .header     { flex-shrink: 0; margin-bottom: 9px; padding: 0.4rem 0 0; }
    .stats-row  { flex-shrink: 0; margin-bottom: 8px; }
    .tabs       { flex-shrink: 0; margin-bottom: 7px; }
    .input-card { flex-shrink: 0; margin-bottom: 7px; }
    .export-bar { flex-shrink: 0; }

    .header-eyebrow { font-size: 9.5px; }
    .header h1  { font-size: 21px; }
    .header-sub { display: none; }

    .stats-row { gap: 6px; }
    .stat-card { padding: 0.55rem 0.65rem; border-radius: 10px; }
    .stat-label { font-size: 9px; }
    .stat-value { font-size: 14px; }

    .tab-btn {
      padding: 0;
      height: 42px;
      font-size: 12.5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .input-card {
      height: 52px;
      padding: 0 12px;
      border-radius: 12px;
      gap: 10px;
    }
    .input-label  { font-size: 12px; }
    .input-card input { font-size: 20px; }
    .divider-v    { height: 22px; }
    .calc-btn     { padding: 0 14px; height: 34px; font-size: 13px; border-radius: 8px; }

    .table-card {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      margin-bottom: 7px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
    }

    .card-header { flex-shrink: 0; padding: 9px 13px; }
    .card-title  { font-size: 10.5px; }
    .count-badge { font-size: 10.5px; padding: 2px 9px; }

    .tab-panel.active {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .table-wrapper {
      flex: 1;
      min-height: 0;
      overflow-x: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 7px 10px;
      font-size: 9.5px;
    }

    table    { font-size: 12.5px; }
    tbody td { padding: 9px 10px; }
    tfoot td { padding: 9px 10px; font-size: 12.5px; }
    tfoot .c-num      { font-size: 13px; }
    tfoot .c-num-bold { font-size: 13px; }
    .c-num-bold { font-size: 12.5px; }
    .pct-badge  { font-size: 11.5px; padding: 2px 8px; }
    .flag-yes   { font-size: 11.5px; padding: 2px 7px; }
    .swatch     { width: 6px; height: 6px; }
    .name-pill  { gap: 5px; }

    #panel1 table { table-layout: fixed; }
    #panel1 th:nth-child(1) { width: 45%; }
    #panel1 th:nth-child(2) { width: 20%; }
    #panel1 th:nth-child(3) { width: 35%; }

    .export-bar { gap: 6px; flex-wrap: nowrap; }
    .exp-btn {
      flex: 1;
      min-width: 0;
      height: 46px;
      padding: 0 5px;
      font-size: 12.5px;
      border-radius: 10px;
      gap: 4px;
    }
    .exp-btn svg { width: 13px; height: 13px; }

    .toast { font-size: 12px; padding: 8px 14px; margin-top: 6px; }
  }

  @media (max-width: 375px) {
    .header h1  { font-size: 18px; }
    .tab-btn    { font-size: 11px; height: 38px; }
    .input-card { height: 48px; }
    .stat-value { font-size: 12px; }
    table       { font-size: 11.5px; }
    thead th    { font-size: 9px; padding: 6px 8px; }
    tbody td    { padding: 7px 8px; }
    .exp-btn    { font-size: 11.5px; height: 42px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-eyebrow">إدارة الأصول العقارية</div>
    <h1>توزيع الإيجارات</h1>
    <div class="header-sub">احتساب وتوزيع العائد الإيجاري على المستفيدين</div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">المبلغ الإجمالي</div>
      <div class="stat-value gold" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">عدد المستفيدين</div>
      <div class="stat-value" id="stat-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">أعلى حصة</div>
      <div class="stat-value" id="stat-max">—</div>
    </div>
  </div>

  <div class="input-card">
    <span class="input-label">المبلغ الإجمالي</span>
    <div class="divider-v"></div>
    <input type="number" id="totalAmount" value="702200" min="0" step="1" placeholder="أدخل المبلغ" />
    <button class="calc-btn" onclick="calculate()">احتساب</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="btn-tab1" onclick="switchTab('tab1')">التوزيع العادي</button>
    <button class="tab-btn"        id="btn-tab2" onclick="switchTab('tab2')">التوزيع مع الخصومات</button>
  </div>

  <div class="table-card">
    <div class="card-header">
      <span class="card-title">جدول التوزيع</span>
      <span class="count-badge" id="count"></span>
    </div>

    <!-- Tab 1 -->
    <div id="panel1" class="tab-panel active">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>المستفيد</th>
              <th>الحصة</th>
              <th>المبلغ (ر.س)</th>
            </tr>
          </thead>
          <tbody id="tbody1"></tbody>
          <tfoot id="tfoot1"></tfoot>
        </table>
      </div>
    </div>

    <!-- Tab 2 -->
    <div id="panel2" class="tab-panel">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>الاسم</th>
              <th>النسبة</th>
              <th>المبلغ</th>
              <th>هل مسامح</th>
              <th>مبلغ المسامحة</th>
              <th>هل يوجد التزامات</th>
              <th>المبلغ بعد الخصم</th>
            </tr>
          </thead>
          <tbody id="tbody2"></tbody>
          <tfoot id="tfoot2"></tfoot>
        </table>
      </div>
    </div>
  </div>

  <div class="export-bar">
    <button class="exp-btn primary" onclick="exportCSV()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      تصدير CSV
    </button>
    <button class="exp-btn ghost" onclick="exportExcel()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      تصدير Excel
    </button>
    <button class="exp-btn ghost" onclick="window.print()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      طباعة / PDF
    </button>
  </div>

  <div class="toast" id="toast"></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const PALETTE = [
  "#F59E0B","#3B82F6","#10B981","#EF4444","#8B5CF6",
  "#06B6D4","#F97316","#EC4899","#84CC16","#A78BFA",
  "#14B8A6","#FB923C"
];

const people = [
  { name: "الوالدة",               pct: 9.60  },
  { name: "الوالدة من نصيب صالح", pct: 1.80  },
  { name: "نصيب ورثة صالح",       pct: 9.00  },
  { name: "يحيى",                  pct: 40.00 },
  { name: "أحمد",                  pct: 7.20  },
  { name: "عبدالرحمن",            pct: 7.20  },
  { name: "هاني",                  pct: 7.20  },
  { name: "نورية",                 pct: 3.60  },
  { name: "جميلة",                 pct: 3.60  },
  { name: "منى",                   pct: 3.60  },
  { name: "جواهر",                 pct: 3.60  },
  { name: "هدى",                   pct: 3.60  },
];

const peopleWithDeductions = [
  { name: "الوالدة",               pct: 0.096, samah: true,  yoojad: null  },
  { name: "الوالدة من نصيب صالح", pct: 0.018, samah: true,  yoojad: null  },
  { name: "نصيب ورثة صالح",       pct: 0.09,  samah: false, yoojad: null  },
  { name: "يحيى",                  pct: 0.4,   samah: true,  yoojad: null  },
  { name: "أحمد",                  pct: 0.072, samah: false, yoojad: null  },
  { name: "عبدالرحمن",            pct: 0.072, samah: true,  yoojad: null  },
  { name: "هاني",                  pct: 0.072, samah: false, yoojad: null  },
  { name: "نورية",                 pct: 0.036, samah: true,  yoojad: null  },
  { name: "جميلة",                 pct: 0.036, samah: true,  yoojad: 14040 },
  { name: "منى",                   pct: 0.036, samah: true,  yoojad: null  },
  { name: "جواهر",                 pct: 0.036, samah: true,  yoojad: 11700 },
  { name: "هدى",                   pct: 0.036, samah: true,  yoojad: null  },
];

let activeTab = 'tab1';
let currentAmounts1 = [];
let currentTab2Data = [];

function fmt(n) {
  return n.toLocaleString("en-US", { minimumFractionDigits: 1, maximumFractionDigits: 1 });
}
function fmtPct(d) { return +(d * 100).toFixed(4); }

function updateStats(total) {
  document.getElementById('stat-total').textContent = total ? fmt(total) : '—';
  document.getElementById('stat-count').textContent = people.length;
  const top = people.reduce((a, b) => a.pct > b.pct ? a : b);
  document.getElementById('stat-max').textContent = top.name;
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('btn-tab1').classList.toggle('active', tab === 'tab1');
  document.getElementById('btn-tab2').classList.toggle('active', tab === 'tab2');
  document.getElementById('panel1').classList.toggle('active', tab === 'tab1');
  document.getElementById('panel2').classList.toggle('active', tab === 'tab2');
  calculate();
}

function calculate() {
  const total = parseFloat(document.getElementById("totalAmount").value) || 0;
  document.getElementById("count").textContent = `${people.length} مستفيد`;
  updateStats(total);
  if (activeTab === 'tab1') calculateTab1(total);
  else calculateTab2(total);
}

function calculateTab1(total) {
  const amounts = people.map(p => (p.pct / 100) * total);
  currentAmounts1 = amounts;

  document.getElementById("tbody1").innerHTML = people.map((p, i) => {
    const c = PALETTE[i % PALETTE.length];
    return `<tr>
      <td class="c-name"><span class="name-pill"><span class="swatch" style="background:${c};color:${c}"></span>${p.name}</span></td>
      <td class="c-pct"><span class="pct-badge">${p.pct}%</span></td>
      <td class="c-num-bold" style="color:${c}">${fmt(amounts[i])}</td>
    </tr>`;
  }).join("");

  const tot = amounts.reduce((a, b) => a + b, 0);
  document.getElementById("tfoot1").innerHTML = `<tr>
    <td class="c-name" colspan="2">الإجمالي</td>
    <td class="c-num-bold">${fmt(tot)}</td>
  </tr>`;
}

function calculateTab2(total) {
  currentTab2Data = [];
  let sumAmt = 0, sumSamah = 0, sumAfter = 0;

  const rows = peopleWithDeductions.map((p, i) => {
    const c         = PALETTE[i % PALETTE.length];
    const amount    = p.pct * total;
    const samahAmt  = p.samah ? Math.round(amount * 11 / 39 * 10) / 10 : 0;
    const yoojadAmt = p.yoojad || 0;
    const after     = amount - samahAmt - yoojadAmt;

    sumAmt += amount; sumSamah += samahAmt; sumAfter += after;
    currentTab2Data.push({ ...p, amount, samahAmt, yoojadAmt, afterDeduct: after });

    const ac = after < 0 ? '#EF4444' : c;
    const pctD = fmtPct(p.pct);

    const samahCell  = p.samah ? `<span class="flag-yes">نعم</span>` : `<span class="flag-dash">—</span>`;
    const yoojadCell = p.yoojad
      ? `<span style="direction:ltr;font-variant-numeric:tabular-nums;color:var(--text-2)">${p.yoojad.toLocaleString("en-US")}</span>`
      : `<span class="flag-dash">—</span>`;

    return `<tr>
      <td class="c-name"><span class="name-pill"><span class="swatch" style="background:${c};color:${c}"></span>${p.name}</span></td>
      <td class="c-pct"><span class="pct-badge">${pctD}%</span></td>
      <td class="c-num">${fmt(amount)}</td>
      <td class="c-flag">${samahCell}</td>
      <td class="c-num">${fmt(samahAmt)}</td>
      <td class="c-flag">${yoojadCell}</td>
      <td class="c-num-bold" style="color:${ac}">${fmt(after)}</td>
    </tr>`;
  }).join("");

  document.getElementById("tbody2").innerHTML = rows;
  document.getElementById("tfoot2").innerHTML = `<tr>
    <td class="c-name" colspan="2">الإجمالي</td>
    <td class="c-num">${fmt(sumAmt)}</td>
    <td class="c-flag"></td>
    <td class="c-num">${fmt(sumSamah)}</td>
    <td class="c-flag"></td>
    <td class="c-num-bold"${sumAfter < 0 ? ' style="color:#EF4444"' : ''}>${fmt(sumAfter)}</td>
  </tr>`;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("show");
  void t.offsetWidth;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function getTab1ExportData() {
  const total = parseFloat(document.getElementById("totalAmount").value) || 0;
  if (!currentAmounts1.length) calculateTab1(total);
  const rows = people.map((p, i) => ({ "الاسم": p.name, "النسبة (%)": p.pct, "المبلغ": currentAmounts1[i] }));
  rows.push({ "الاسم": "الإجمالي", "النسبة (%)": 100, "المبلغ": currentAmounts1.reduce((a,b)=>a+b,0) });
  return { headers: ["الاسم","النسبة (%)","المبلغ"], rows };
}

function getTab2ExportData() {
  const total = parseFloat(document.getElementById("totalAmount").value) || 0;
  if (!currentTab2Data.length) calculateTab2(total);
  const headers = ["الاسم","النسبة (%)","المبلغ","هل مسامح","مبلغ المسامحة","هل يوجد التزامات","المبلغ بعد الخصم"];
  const rows = currentTab2Data.map(p => ({
    "الاسم": p.name,
    "النسبة (%)": fmtPct(p.pct),
    "المبلغ": p.amount,
    "هل مسامح": p.samah ? "نعم" : "—",
    "مبلغ المسامحة": p.samahAmt,
    "هل يوجد التزامات": p.yoojad || "—",
    "المبلغ بعد الخصم": p.afterDeduct,
  }));
  rows.push({
    "الاسم": "الإجمالي","النسبة (%)": 100,
    "المبلغ": currentTab2Data.reduce((a,p)=>a+p.amount,0),
    "هل مسامح": "",
    "مبلغ المسامحة": currentTab2Data.reduce((a,p)=>a+p.samahAmt,0),
    "هل يوجد التزامات": "",
    "المبلغ بعد الخصم": currentTab2Data.reduce((a,p)=>a+p.afterDeduct,0),
  });
  return { headers, rows };
}

function exportCSV() {
  const { headers, rows } = activeTab === 'tab1' ? getTab1ExportData() : getTab2ExportData();
  const total = parseFloat(document.getElementById("totalAmount").value) || 0;
  const BOM = "﻿";
  const lines = [headers.join(","), ...rows.map(r => headers.map(h => `"${r[h]}"`).join(","))];
  const blob = new Blob([BOM + lines.join("\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `توزيع_الإيجارات_${total}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast("تم تصدير ملف CSV بنجاح ✓");
}

function exportExcel() {
  const { headers, rows } = activeTab === 'tab1' ? getTab1ExportData() : getTab2ExportData();
  const total = parseFloat(document.getElementById("totalAmount").value) || 0;
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers });
  ws["!dir"] = "RTL";
  ws["!cols"] = headers.map((_, i) => ({ wch: i === 0 ? 26 : 16 }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "توزيع الإيجارات");
  XLSX.writeFile(wb, `توزيع_الإيجارات_${total}.xlsx`);
  showToast("تم تصدير ملف Excel بنجاح ✓");
}

calculate();
</script>
</body>
</html>
